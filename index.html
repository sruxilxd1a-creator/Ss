<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>공간음향 시선 가이드 v2</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000; color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden; touch-action: none; -webkit-user-select: none; user-select: none; }
    #video-container { position: relative; width: 100%; height: 100%; }
    video { width: 100%; height: 100%; object-fit: cover; }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; }
    #ui { position: absolute; top: 0; left: 0; right: 0; padding: 16px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
      pointer-events: none; z-index: 10; }
    #status { font-size: 14px; line-height: 1.6; }
    #status .label { color: #888; }
    #status .value { color: #fff; font-weight: 500; }
    #mic-indicator { display: inline-block; width: 10px; height: 10px;
      border-radius: 50%; background: #555; margin-left: 6px; vertical-align: middle; }
    #mic-indicator.listening { background: #ff3b30; animation: pulse 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    #heard { color: #ffcc00; font-style: italic; margin-top: 4px; min-height: 20px; }
    #crosshair { position: absolute; left: 50%; top: 50%; width: 2px; height: 2px;
      background: rgba(255,255,255,0.6); transform: translate(-50%, -50%);
      box-shadow: 0 0 0 14px rgba(255,255,255,0.08); border-radius: 50%;
      pointer-events: none; z-index: 5; }
    #controls { position: absolute; bottom: 0; left: 0; right: 0; padding: 16px;
      background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
      display: flex; flex-direction: column; gap: 10px; z-index: 10; }
    .row { display: flex; gap: 8px; align-items: center; }
    button { flex: 1; padding: 14px; background: rgba(255,255,255,0.15); color: #fff;
      border: 1px solid rgba(255,255,255,0.3); border-radius: 8px;
      font-size: 14px; font-weight: 500; cursor: pointer;
      -webkit-tap-highlight-color: transparent; }
    button:active { background: rgba(255,255,255,0.3); }
    button.primary { background: #4a8cf7; border-color: #4a8cf7; }
    button.listening { background: #ff3b30; border-color: #ff3b30; }
    #mic-btn { flex: 2; font-size: 16px; padding: 18px; }
    #log { font-size: 11px; max-height: 50px; overflow-y: auto;
      color: #aaa; line-height: 1.4; }
    #hint { font-size: 12px; color: #aaa; text-align: center;
      padding: 8px; background: rgba(255,255,255,0.05); border-radius: 6px; }
  </style>
</head>
<body>
  <div id="video-container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
    <div id="crosshair"></div>
  </div>

  <div id="ui">
    <div id="status">
      <div><span class="label">상태:</span> <span class="value" id="state">대기</span>
        <span id="mic-indicator"></span></div>
      <div><span class="label">찾는 중:</span> <span class="value" id="target">-</span></div>
      <div><span class="label">방향:</span> <span class="value" id="angle">-</span></div>
      <div id="heard"></div>
    </div>
  </div>

  <div id="controls">
    <div id="hint">예: "커피잔 어디", "사람", "노트북 찾아", "그만"</div>
    <div id="log"></div>
    <div class="row">
      <button id="start-btn" class="primary">시작</button>
      <button id="mic-btn">🎤 말하기</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('overlay');
    const ctx = canvas.getContext('2d');
    const stateEl = document.getElementById('state');
    const targetEl = document.getElementById('target');
    const angleEl = document.getElementById('angle');
    const heardEl = document.getElementById('heard');
    const micIndicator = document.getElementById('mic-indicator');
    const startBtn = document.getElementById('start-btn');
    const micBtn = document.getElementById('mic-btn');
    const logEl = document.getElementById('log');

    const ASSUMED_HORIZONTAL_FOV_DEG = 65;
    const MAX_AZIMUTH_DEG = 60;
    const ARRIVAL_THRESHOLD_DEG = 8;
    const AUTO_INTERVAL_MS = 1500;
    const MAX_GUIDE_DURATION_MS = 30000;

    const KEYWORD_MAP = {
      '커피잔': 'cup', '컵': 'cup', '잔': 'cup', '머그': 'cup', '머그잔': 'cup',
      '병': 'bottle', '물병': 'bottle', '페트병': 'bottle',
      '책': 'book', '도서': 'book',
      '핸드폰': 'cell phone', '폰': 'cell phone', '휴대폰': 'cell phone', '스마트폰': 'cell phone',
      '노트북': 'laptop', '랩탑': 'laptop',
      '키보드': 'keyboard',
      '마우스': 'mouse',
      '리모컨': 'remote', '리모콘': 'remote',
      '의자': 'chair',
      '소파': 'couch',
      '식탁': 'dining table', '테이블': 'dining table', '책상': 'dining table',
      '침대': 'bed',
      '변기': 'toilet',
      '티비': 'tv', 'TV': 'tv', '텔레비전': 'tv', '모니터': 'tv',
      '사람': 'person', '인물': 'person',
      '강아지': 'dog', '개': 'dog',
      '고양이': 'cat',
      '가방': 'backpack', '백팩': 'backpack',
      '핸드백': 'handbag',
      '여행가방': 'suitcase', '캐리어': 'suitcase',
      '우산': 'umbrella',
      '시계': 'clock',
      '화분': 'potted plant', '식물': 'potted plant',
      '꽃병': 'vase',
      '가위': 'scissors',
      '칫솔': 'toothbrush',
      '포크': 'fork',
      '나이프': 'knife', '칼': 'knife',
      '숟가락': 'spoon', '스푼': 'spoon',
      '그릇': 'bowl', '보울': 'bowl',
      '바나나': 'banana', '사과': 'apple', '오렌지': 'orange',
      '샌드위치': 'sandwich', '피자': 'pizza', '도넛': 'donut', '케이크': 'cake',
      '자동차': 'car', '차': 'car', '버스': 'bus', '트럭': 'truck',
      '자전거': 'bicycle', '오토바이': 'motorcycle',
      '신호등': 'traffic light',
      '백팩': 'backpack',
    };

    const STOP_KEYWORDS = ['그만', '중지', '멈춰', '꺼', '취소', '중단'];

    let model = null;
    let stream = null;
    let detectLoopId = null;
    let autoIntervalId = null;
    let guideTimeoutId = null;
    let currentDetections = [];
    let targetLabel = '';
    let lastAnnouncedAngle = null;
    let audioCtx = null;
    let panner = null;
    let masterGain = null;
    let recognition = null;
    let isListening = false;

    function log(msg) {
      const now = new Date().toTimeString().slice(0, 8);
      logEl.innerHTML = `[${now}] ${msg}<br>` + logEl.innerHTML;
      if (logEl.innerHTML.length > 600) logEl.innerHTML = logEl.innerHTML.slice(0, 600);
    }

    async function initCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' },
                   width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false
        });
        video.srcObject = stream;
        await new Promise(res => { video.onloadedmetadata = res; });
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        log('카메라: ' + video.videoWidth + 'x' + video.videoHeight);
        return true;
      } catch (e) {
        log('카메라 오류: ' + e.message);
        alert('카메라 접근 실패: ' + e.message);
        return false;
      }
    }

    async function initAudio() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 1.0;
      panner = audioCtx.createPanner();
      panner.panningModel = 'HRTF';
      panner.distanceModel = 'inverse';
      panner.refDistance = 1;
      panner.maxDistance = 10;
      panner.rolloffFactor = 1;
      panner.connect(masterGain);
      masterGain.connect(audioCtx.destination);
      const l = audioCtx.listener;
      if (l.positionX) {
        l.positionX.value = 0; l.positionY.value = 0; l.positionZ.value = 0;
        l.forwardX.value = 0; l.forwardY.value = 0; l.forwardZ.value = -1;
        l.upX.value = 0; l.upY.value = 1; l.upZ.value = 0;
      } else {
        l.setPosition(0, 0, 0);
        l.setOrientation(0, 0, -1, 0, 1, 0);
      }
      log('오디오 준비됨');
    }

    function setPannerAzimuth(azDeg, distance = 2) {
      const az = azDeg * Math.PI / 180;
      const x = Math.sin(az) * distance;
      const z = -Math.cos(az) * distance;
      if (panner.positionX) {
        panner.positionX.setValueAtTime(x, audioCtx.currentTime);
        panner.positionY.setValueAtTime(0, audioCtx.currentTime);
        panner.positionZ.setValueAtTime(z, audioCtx.currentTime);
      } else {
        panner.setPosition(x, 0, z);
      }
    }

    function speakAt(text, azimuthDeg) {
      setPannerAzimuth(azimuthDeg);
      const utter = new SpeechSynthesisUtterance(text);
      const voices = speechSynthesis.getVoices();
      const ko = voices.find(v => v.lang.startsWith('ko'));
      if (ko) utter.voice = ko;
      utter.rate = 1.1;
      speechSynthesis.cancel();
      speechSynthesis.speak(utter);
    }

    function playChimeAt(azimuthDeg, freq = 880, durationMs = 280) {
      setPannerAzimuth(azimuthDeg, 1.5);
      const osc = audioCtx.createOscillator();
      const env = audioCtx.createGain();
      osc.frequency.value = freq;
      osc.type = 'sine';
      env.gain.setValueAtTime(0, audioCtx.currentTime);
      env.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 0.02);
      env.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + durationMs / 1000);
      osc.connect(env);
      env.connect(panner);
      osc.start();
      osc.stop(audioCtx.currentTime + durationMs / 1000 + 0.05);
    }

    async function initModel() {
      stateEl.textContent = '모델 로딩 중';
      log('모델 다운로드 중...');
      model = await cocoSsd.load({ base: 'lite_mobilenet_v2' });
      log('모델 준비됨');
      stateEl.textContent = '준비됨';
    }

    function initSpeechRecognition() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) { log('음성 인식 미지원 브라우저'); return false; }
      recognition = new SR();
      recognition.lang = 'ko-KR';
      recognition.continuous = false;
      recognition.interimResults = true;
      recognition.maxAlternatives = 3;

      recognition.onstart = () => {
        isListening = true;
        micIndicator.classList.add('listening');
        micBtn.classList.add('listening');
        micBtn.textContent = '🔴 듣는 중...';
        playChimeAt(0, 660, 120);
        log('음성 인식 시작');
      };

      recognition.onresult = (event) => {
        let finalTranscript = '';
        let interimTranscript = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const transcript = event.results[i][0].transcript;
          if (event.results[i].isFinal) finalTranscript += transcript;
          else interimTranscript += transcript;
        }
        heardEl.textContent = (finalTranscript || interimTranscript).trim();
        if (finalTranscript) {
          handleVoiceCommand(finalTranscript.trim());
        }
      };

      recognition.onerror = (event) => {
        log('음성 인식 오류: ' + event.error);
        stopListening();
        if (event.error === 'not-allowed') {
          alert('마이크 권한이 필요합니다');
        }
      };

      recognition.onend = () => { stopListening(); };
      return true;
    }

    function startListening() {
      if (!recognition || isListening) return;
      heardEl.textContent = '';
      try { recognition.start(); }
      catch (e) { log('인식 시작 실패: ' + e.message); }
    }

    function stopListening() {
      isListening = false;
      micIndicator.classList.remove('listening');
      micBtn.classList.remove('listening');
      micBtn.textContent = '🎤 말하기';
    }

    function handleVoiceCommand(text) {
      log('들음: "' + text + '"');
      const lower = text.toLowerCase().replace(/[?!.,]/g, '');

      for (const stopWord of STOP_KEYWORDS) {
        if (lower.includes(stopWord)) {
          stopGuiding();
          speakAt('가이드 중단', 0);
          return;
        }
      }

      let matched = null;
      let matchedKeyword = null;
      const sortedKeys = Object.keys(KEYWORD_MAP).sort((a, b) => b.length - a.length);
      for (const keyword of sortedKeys) {
        if (lower.includes(keyword.toLowerCase())) {
          matched = KEYWORD_MAP[keyword];
          matchedKeyword = keyword;
          break;
        }
      }

      if (!matched) {
        speakAt('찾을 수 있는 물건을 말해주세요', 0);
        log('매칭 실패');
        return;
      }

      targetLabel = matched;
      lastAnnouncedAngle = null;
      targetEl.textContent = matchedKeyword + ' (' + matched + ')';
      log('타겟 설정: ' + matchedKeyword + ' → ' + matched);

      setTimeout(() => startGuiding(matchedKeyword), 200);
    }

    function pixelToAzimuth(centerX, frameWidth) {
      const normalized = (centerX - frameWidth / 2) / (frameWidth / 2);
      return normalized * (ASSUMED_HORIZONTAL_FOV_DEG / 2);
    }

    function drawDetections() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.lineWidth = 3;
      ctx.font = 'bold 18px sans-serif';
      for (const d of currentDetections) {
        const [x, y, w, h] = d.bbox;
        const isTarget = d.class === targetLabel;
        ctx.strokeStyle = isTarget ? '#ffcc00' : 'rgba(255,255,255,0.4)';
        ctx.lineWidth = isTarget ? 4 : 2;
        ctx.strokeRect(x, y, w, h);
        ctx.fillStyle = isTarget ? '#ffcc00' : 'rgba(255,255,255,0.6)';
        ctx.fillText(d.class, x + 4, y + 22);
      }
    }

    function findBestTarget() {
      if (!targetLabel) return null;
      const matches = currentDetections.filter(d => d.class === targetLabel);
      if (matches.length === 0) return null;
      matches.sort((a, b) => (b.bbox[2] * b.bbox[3]) - (a.bbox[2] * a.bbox[3]));
      return matches[0];
    }

    async function detectLoop() {
      if (!model || video.readyState !== 4) {
        detectLoopId = requestAnimationFrame(detectLoop);
        return;
      }
      try {
        currentDetections = await model.detect(video, 10, 0.45);
        drawDetections();
        const target = findBestTarget();
        if (target) {
          const cx = target.bbox[0] + target.bbox[2] / 2;
          const az = pixelToAzimuth(cx, video.videoWidth);
          angleEl.textContent = (az >= 0 ? '+' : '') + az.toFixed(1) + '°';
        } else if (targetLabel) {
          angleEl.textContent = '안 보임';
        }
      } catch (e) { log('감지 오류: ' + e.message); }
      detectLoopId = requestAnimationFrame(detectLoop);
    }

    function startGuiding(displayName) {
      stopGuiding();
      let firstAnnounceDone = false;
      let notFoundCount = 0;

      autoIntervalId = setInterval(() => {
        const target = findBestTarget();
        if (!target) {
          notFoundCount++;
          if (!firstAnnounceDone && notFoundCount === 2) {
            speakAt(displayName + '이 안 보여요. 주변을 둘러봐주세요', 0);
            firstAnnounceDone = true;
          }
          return;
        }
        notFoundCount = 0;
        const cx = target.bbox[0] + target.bbox[2] / 2;
        const az = pixelToAzimuth(cx, video.videoWidth);
        const absAz = Math.abs(az);
        const clamped = Math.max(-MAX_AZIMUTH_DEG, Math.min(MAX_AZIMUTH_DEG, az));

        if (!firstAnnounceDone) {
          const dir = az < 0 ? '왼쪽' : '오른쪽';
          if (absAz <= ARRIVAL_THRESHOLD_DEG) {
            speakAt(displayName + ' 정면에 있어요', 0);
            playChimeAt(0, 1320, 240);
            setTimeout(() => stopGuiding(), 1500);
          } else {
            speakAt(displayName + ' ' + dir + ' ' + Math.round(absAz) + '도', clamped);
          }
          firstAnnounceDone = true;
          lastAnnouncedAngle = az;
          return;
        }

        if (absAz <= ARRIVAL_THRESHOLD_DEG) {
          playChimeAt(0, 1320, 200);
          setTimeout(() => {
            speakAt('찾았어요', 0);
            stopGuiding();
          }, 200);
          return;
        }

        if (lastAnnouncedAngle !== null && Math.abs(lastAnnouncedAngle - az) < 5) return;
        const chimeFreq = 660 + (1 - absAz / 60) * 600;
        playChimeAt(clamped, chimeFreq, 160);
        lastAnnouncedAngle = az;
      }, AUTO_INTERVAL_MS);

      guideTimeoutId = setTimeout(() => {
        speakAt('찾는 시간이 너무 길어요. 다시 말씀해주세요', 0);
        stopGuiding();
      }, MAX_GUIDE_DURATION_MS);
    }

    function stopGuiding() {
      if (autoIntervalId) { clearInterval(autoIntervalId); autoIntervalId = null; }
      if (guideTimeoutId) { clearTimeout(guideTimeoutId); guideTimeoutId = null; }
      lastAnnouncedAngle = null;
    }

    startBtn.addEventListener('click', async () => {
      startBtn.disabled = true;
      startBtn.textContent = '시작 중...';
      const camOk = await initCamera();
      if (!camOk) { startBtn.disabled = false; startBtn.textContent = '시작'; return; }
      await initAudio();
      await initModel();
      const srOk = initSpeechRecognition();
      if (!srOk) micBtn.disabled = true;
      stateEl.textContent = '감지 중';
      startBtn.textContent = '실행 중';
      detectLoop();
      log('가동 완료');
      speechSynthesis.getVoices();
      setTimeout(() => speakAt('준비됐어요. 무엇을 찾아드릴까요', 0), 500);
    });

    micBtn.addEventListener('click', () => {
      if (!audioCtx) { alert('먼저 시작 버튼을 눌러주세요'); return; }
      isListening ? recognition.stop() : startListening();
    });

    document.addEventListener('touchstart', () => {
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    }, { once: false });
  </script>
</body>
</html>
