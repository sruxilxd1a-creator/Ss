<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>공간음향 시선 가이드 v4 (Gemini)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000; color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden; touch-action: none; -webkit-user-select: none; user-select: none; }
    #video-container { position: relative; width: 100%; height: 100%; }
    video { width: 100%; height: 100%; object-fit: cover; }
    canvas#overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; }
    #ui { position: absolute; top: 0; left: 0; right: 0; padding: 14px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.78), transparent);
      pointer-events: none; z-index: 10; }
    #status { font-size: 13px; line-height: 1.6; }
    #status .label { color: #888; }
    #status .value { color: #fff; font-weight: 500; }
    #mic-indicator { display: inline-block; width: 10px; height: 10px;
      border-radius: 50%; background: #555; margin-left: 6px; vertical-align: middle; }
    #mic-indicator.listening { background: #ff3b30; animation: pulse 1s infinite; }
    #mic-indicator.thinking { background: #ffaa00; animation: pulse 0.6s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    #heard { color: #ffcc00; font-style: italic; margin-top: 2px; min-height: 18px; }
    #crosshair { position: absolute; left: 50%; top: 50%; width: 2px; height: 2px;
      background: rgba(255,255,255,0.6); transform: translate(-50%, -50%);
      box-shadow: 0 0 0 14px rgba(255,255,255,0.08); border-radius: 50%;
      pointer-events: none; z-index: 5; }
    #controls { position: absolute; bottom: 0; left: 0; right: 0; padding: 14px;
      background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
      display: flex; flex-direction: column; gap: 9px; z-index: 10; }
    .row { display: flex; gap: 8px; align-items: center; }
    button { flex: 1; padding: 13px; background: rgba(255,255,255,0.15); color: #fff;
      border: 1px solid rgba(255,255,255,0.3); border-radius: 8px;
      font-size: 14px; font-weight: 500; cursor: pointer;
      -webkit-tap-highlight-color: transparent; }
    button:active { background: rgba(255,255,255,0.3); }
    button.primary { background: #4a8cf7; border-color: #4a8cf7; }
    button.listening { background: #ff3b30; border-color: #ff3b30; }
    button:disabled { opacity: 0.4; }
    #mic-btn { flex: 2; font-size: 15px; padding: 16px; }
    #log { font-size: 11px; max-height: 44px; overflow-y: auto;
      color: #aaa; line-height: 1.4; }
    #hint { font-size: 12px; color: #aaa; text-align: center;
      padding: 6px; background: rgba(255,255,255,0.05); border-radius: 6px; }
    #key-panel { position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: #111; z-index: 100; padding: 24px;
      display: flex; flex-direction: column; justify-content: center; gap: 14px; }
    #key-panel h2 { font-size: 18px; font-weight: 500; }
    #key-panel p { font-size: 13px; color: #aaa; line-height: 1.6; }
    #key-panel a { color: #6ab0ff; }
    #key-input { padding: 14px; font-size: 14px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1);
      color: #fff; }
    #key-save { padding: 14px; background: #4a8cf7; border: none;
      border-radius: 8px; color: #fff; font-size: 15px; font-weight: 500; }
    .gemini-box { position: absolute; border: 3px solid #00e5ff;
      box-shadow: 0 0 12px rgba(0,229,255,0.6); pointer-events: none;
      z-index: 6; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="key-panel">
    <h2>Gemini API 키 입력</h2>
    <p><a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a>
       에서 무료로 발급받은 키를 붙여넣으세요. 키는 이 기기의 브라우저에만 저장되고
       외부나 깃허브로 전송되지 않습니다. 한 번 저장하면 다음부터 자동으로 불러옵니다.</p>
    <input type="password" id="key-input" placeholder="AIza... 로 시작하는 키" autocomplete="off">
    <label style="font-size:13px;color:#bbb;display:flex;align-items:center;gap:8px">
      <input type="checkbox" id="key-remember" checked style="width:18px;height:18px">
      이 기기에 키 저장 (다음부터 자동 입력)
    </label>
    <button id="key-save">저장하고 시작</button>
    <button id="key-clear" style="background:rgba(255,255,255,0.1);font-size:13px;padding:10px">
      저장된 키 지우기
    </button>
  </div>

  <div id="video-container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
    <div id="crosshair"></div>
  </div>

  <div id="ui">
    <div id="status">
      <div><span class="label">상태:</span> <span class="value" id="state">대기</span>
        <span id="mic-indicator"></span></div>
      <div><span class="label">찾는 중:</span> <span class="value" id="target">-</span>
        <span class="label"> 방향:</span> <span class="value" id="angle">-</span></div>
      <div id="perf" style="font-size:11px;color:#6c6;margin-top:2px">분당 남은 호출: -</div>
      <div id="heard"></div>
    </div>
  </div>

  <div id="controls">
    <div id="hint">예: "파란 텀블러 어디", "내 안경", "리모컨 찾아", "그만"</div>
    <div id="log"></div>
    <div class="row">
      <button id="start-btn" class="primary">시작</button>
      <button id="mic-btn" disabled>🎤 말하기</button>
    </div>
  </div>

  <script>
    const KEY_PANEL = document.getElementById('key-panel');
    const KEY_INPUT = document.getElementById('key-input');
    const KEY_SAVE = document.getElementById('key-save');
    const KEY_CLEAR = document.getElementById('key-clear');
    const KEY_REMEMBER = document.getElementById('key-remember');
    const video = document.getElementById('video');
    const canvas = document.getElementById('overlay');
    const ctx = canvas.getContext('2d');
    const stateEl = document.getElementById('state');
    const targetEl = document.getElementById('target');
    const angleEl = document.getElementById('angle');
    const heardEl = document.getElementById('heard');
    const micIndicator = document.getElementById('mic-indicator');
    const startBtn = document.getElementById('start-btn');
    const micBtn = document.getElementById('mic-btn');
    const logEl = document.getElementById('log');
    const perfEl = document.getElementById('perf');

    const ASSUMED_HORIZONTAL_FOV_DEG = 65;
    const MAX_AZIMUTH_DEG = 60;
    const ARRIVAL_THRESHOLD_DEG = 8;
    const GEMINI_MODEL = 'gemini-2.5-flash';
    const CAPTURE_WIDTH = 512;
    const COMMAND_COOLDOWN_MS = 2000;

    const MIN_GAP_MS = 800;
    const RPM_SOFT_LIMIT = 120;
    const RPM_WINDOW_MS = 60000;
    const RETRY_DELAYS_MS = [2000, 5000];

    const TRACK_INTERVAL_MS = 60;
    const POLL_INTERVAL_MS = 1500;

    let API_KEY = '';
    let model = null;
    let stream = null;
    let audioCtx = null;
    let panner = null;
    let masterGain = null;
    let recognition = null;
    let isListening = false;
    let isThinking = false;
    let captureCanvas = null;
    let captureCtx = null;

    let lastCommandTime = 0;
    let lastCommandText = '';
    let commandHandled = false;
    let earlyFinalizeTimer = null;

    let lastApiCallTime = 0;
    let apiCallTimestamps = [];
    let cooldownTimerId = null;

    let headingDeg = null;
    let headingRef = null;
    let objectWorldAngle = null;
    let startAbsAngle = null;
    let trackTimerId = null;
    let toneOsc = null;
    let toneGain = null;
    let guidePhase = 0;

    let lastAbsAngle = null;
    let lastFeedbackTime = 0;
    let trackStartTime = 0;
    let currentLabel = '';
    let currentQuery = '';
    let reanchorInProgress = false;

    const STOP_KEYWORDS = ['그만', '중지', '멈춰', '취소', '중단'];

    function log(msg) {
      const now = new Date().toTimeString().slice(0, 8);
      logEl.innerHTML = `[${now}] ${msg}<br>` + logEl.innerHTML;
      if (logEl.innerHTML.length > 600) logEl.innerHTML = logEl.innerHTML.slice(0, 600);
    }

    function recentApiCalls() {
      const now = Date.now();
      apiCallTimestamps = apiCallTimestamps.filter(t => now - t < RPM_WINDOW_MS);
      return apiCallTimestamps.length;
    }

    function recordApiCall() {
      apiCallTimestamps.push(Date.now());
      lastApiCallTime = Date.now();
    }

    // 호출 가능 여부 판정. 가능하면 {ok:true}, 아니면 {ok:false, waitMs, reason}
    function checkQuota() {
      const now = Date.now();
      const gap = now - lastApiCallTime;
      if (lastApiCallTime > 0 && gap < MIN_GAP_MS) {
        return { ok: false, waitMs: MIN_GAP_MS - gap, reason: 'gap' };
      }
      if (recentApiCalls() >= RPM_SOFT_LIMIT) {
        const oldest = apiCallTimestamps[0];
        return { ok: false, waitMs: RPM_WINDOW_MS - (now - oldest), reason: 'rpm' };
      }
      return { ok: true };
    }

    function updateQuotaDisplay() {
      const used = recentApiCalls();
      const remaining = Math.max(0, RPM_SOFT_LIMIT - used);
      const gap = Date.now() - lastApiCallTime;
      let txt = '분당 남은 호출: ' + remaining + '/' + RPM_SOFT_LIMIT;
      if (lastApiCallTime > 0 && gap < MIN_GAP_MS) {
        txt += ' | 다음 요청까지 ' + Math.ceil((MIN_GAP_MS - gap) / 1000) + '초';
      } else {
        txt += ' | 지금 요청 가능';
      }
      perfEl.textContent = txt;
    }

    const STORAGE_KEY = 'spatial_guide_gemini_key';

    function loadSavedKey() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved && saved.startsWith('AIza')) {
          KEY_INPUT.value = saved;
          log('저장된 키 불러옴');
          return saved;
        }
      } catch (e) { }
      return '';
    }

    async function verifyKey(k) {
      const resp = await fetch(
        'https://generativelanguage.googleapis.com/v1beta/models',
        { headers: { 'x-goog-api-key': k } }
      );
      if (!resp.ok) {
        const t = await resp.text();
        throw new Error('HTTP ' + resp.status + ': ' + t.slice(0, 200));
      }
      const data = await resp.json();
      return Array.isArray(data.models) ? data.models.length : 0;
    }

    KEY_SAVE.addEventListener('click', async () => {
      const k = KEY_INPUT.value.trim();
      if (!k.startsWith('AIza')) {
        alert('키는 보통 AIza로 시작합니다. 다시 확인해주세요.');
        return;
      }
      KEY_SAVE.disabled = true;
      KEY_SAVE.textContent = '키 확인 중...';
      try {
        const count = await verifyKey(k);
        log('키 검증 성공 — 사용 가능 모델 ' + count + '개');
        API_KEY = k;
        try {
          if (KEY_REMEMBER.checked) localStorage.setItem(STORAGE_KEY, k);
          else localStorage.removeItem(STORAGE_KEY);
        } catch (e) {
          alert('키 저장 실패 (브라우저 저장소 비활성). 이번 세션만 사용됩니다.');
        }
        KEY_PANEL.style.display = 'none';
      } catch (e) {
        let hint = e.message;
        if (e.message.includes('400') || e.message.toLowerCase().includes('not valid'))
          hint = '키가 유효하지 않습니다. 복사가 깨졌는지 확인하거나 새로 발급하세요.';
        else if (e.message.includes('403'))
          hint = '키 권한 문제입니다. AI Studio에서 Generative Language API가 켜져 있는지 확인하세요.';
        alert('키 검증 실패:\n' + hint);
        log('키 검증 실패: ' + e.message);
      } finally {
        KEY_SAVE.disabled = false;
        KEY_SAVE.textContent = '저장하고 시작';
      }
    });

    KEY_CLEAR.addEventListener('click', () => {
      try { localStorage.removeItem(STORAGE_KEY); } catch (e) { }
      KEY_INPUT.value = '';
      API_KEY = '';
      alert('저장된 키를 지웠습니다.');
    });

    const savedKey = loadSavedKey();
    if (savedKey) {
      API_KEY = savedKey;
      KEY_PANEL.style.display = 'none';
    }

    async function initCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: 'environment' },
            width: { ideal: 1920 }, height: { ideal: 1080 }
          },
          audio: false
        });
        video.srcObject = stream;
        await new Promise(res => { video.onloadedmetadata = res; });
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        const track = stream.getVideoTracks()[0];
        if (track && track.applyConstraints) {
          try {
            const caps = track.getCapabilities ? track.getCapabilities() : {};
            if (caps.focusMode && caps.focusMode.includes('continuous'))
              await track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] });
          } catch (e) {}
        }

        captureCanvas = document.createElement('canvas');
        const ratio = video.videoHeight / video.videoWidth;
        captureCanvas.width = CAPTURE_WIDTH;
        captureCanvas.height = Math.round(CAPTURE_WIDTH * ratio);
        captureCtx = captureCanvas.getContext('2d');

        log('카메라: ' + video.videoWidth + 'x' + video.videoHeight);
        return true;
      } catch (e) {
        log('카메라 오류: ' + e.message);
        alert('카메라 접근 실패: ' + e.message);
        return false;
      }
    }

    async function initAudio() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 1.0;
      masterGain.connect(audioCtx.destination);
      const l = audioCtx.listener;
      if (l.positionX) {
        l.positionX.value = 0; l.positionY.value = 0; l.positionZ.value = 0;
        l.forwardX.value = 0; l.forwardY.value = 0; l.forwardZ.value = -1;
        l.upX.value = 0; l.upY.value = 1; l.upZ.value = 0;
      } else {
        l.setPosition(0, 0, 0);
        l.setOrientation(0, 0, -1, 0, 1, 0);
      }
      log('오디오 준비됨');
    }

    // ── 음성 파일 로딩 ──
    const VOICE_FILES = {
      here: 'audio/here.mp3',
      yes: 'audio/Yes.mp3',
      no: 'audio/No.mp3',
      bingo: 'audio/Bingo.mp3'
    };
    const voiceBuffers = {};

    async function loadVoiceFiles() {
      const names = Object.keys(VOICE_FILES);
      let ok = 0;
      for (const name of names) {
        try {
          const resp = await fetch(VOICE_FILES[name]);
          if (!resp.ok) throw new Error('HTTP ' + resp.status);
          const arr = await resp.arrayBuffer();
          voiceBuffers[name] = await audioCtx.decodeAudioData(arr);
          ok++;
        } catch (e) {
          log('음성 로드 실패 [' + name + ']: ' + e.message);
        }
      }
      log('음성 파일 ' + ok + '/' + names.length + '개 로드됨');
      return ok === names.length;
    }

    // 방위각(도)에 맞춰 panner 좌표 계산. 거리를 크게 둬야 HRTF 방향감이 산다
    function azToPosition(azDeg, distance) {
      const az = azDeg * Math.PI / 180;
      return {
        x: Math.sin(az) * distance,
        y: 0,
        z: -Math.cos(az) * distance
      };
    }

    // 새 panner를 만들어 방향을 부여 (소리가 겹쳐도 각자 방향 유지)
    function makePanner(azDeg, distance) {
      const p = audioCtx.createPanner();
      p.panningModel = 'HRTF';
      p.distanceModel = 'inverse';
      p.refDistance = 1;
      p.maxDistance = 10000;
      p.rolloffFactor = 0.4;
      const pos = azToPosition(azDeg, distance);
      if (p.positionX) {
        p.positionX.value = pos.x;
        p.positionY.value = pos.y;
        p.positionZ.value = pos.z;
      } else {
        p.setPosition(pos.x, pos.y, pos.z);
      }
      return p;
    }

    // 음성 파일을 특정 방향에서 재생. 재생 중 panner 참조를 돌려줘 추적 갱신 가능
    function playVoiceAt(name, azDeg, opts = {}) {
      const buf = voiceBuffers[name];
      if (!buf) { log('버퍼 없음: ' + name); return null; }
      const distance = opts.distance || 4;
      const panner = makePanner(azDeg, distance);
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      const gain = audioCtx.createGain();
      gain.gain.value = opts.volume || 1.0;
      src.connect(gain);
      gain.connect(panner);
      panner.connect(masterGain);
      src.start();
      const handle = { src, panner, gain, distance };
      src.onended = () => { handle.ended = true; };
      return handle;
    }

    // 재생 중인 음성의 방향을 실시간 갱신 (폰을 돌리면 소리도 따라옴)
    function updateVoiceAzimuth(handle, azDeg) {
      if (!handle || handle.ended) return;
      const pos = azToPosition(azDeg, handle.distance);
      const p = handle.panner;
      if (p.positionX) {
        p.positionX.setTargetAtTime(pos.x, audioCtx.currentTime, 0.05);
        p.positionY.setTargetAtTime(pos.y, audioCtx.currentTime, 0.05);
        p.positionZ.setTargetAtTime(pos.z, audioCtx.currentTime, 0.05);
      } else {
        p.setPosition(pos.x, pos.y, pos.z);
      }
    }

    // 방향성 비프음 (강화된 HRTF)
    function playChimeAt(azimuthDeg, freq = 880, durationMs = 280) {
      const panner = makePanner(azimuthDeg, 4);
      const osc = audioCtx.createOscillator();
      const env = audioCtx.createGain();
      osc.frequency.value = freq;
      osc.type = 'sine';
      env.gain.setValueAtTime(0, audioCtx.currentTime);
      env.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 0.02);
      env.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + durationMs / 1000);
      osc.connect(env);
      env.connect(panner);
      panner.connect(masterGain);
      osc.start();
      osc.stop(audioCtx.currentTime + durationMs / 1000 + 0.05);
    }

    // TTS 대체 — 상태 안내용 (방향 불필요한 경우만 사용)
    function speakAt(text, azimuthDeg) {
      const utter = new SpeechSynthesisUtterance(text);
      const voices = speechSynthesis.getVoices();
      const ko = voices.find(v => v.lang.startsWith('ko'));
      if (ko) utter.voice = ko;
      utter.rate = 1.1;
      speechSynthesis.cancel();
      speechSynthesis.speak(utter);
    }

    // ── 자이로 헤딩 추적 ──
    function onDeviceOrientation(e) {
      // alpha: 나침반 방향 (0~360). webkitCompassHeading 우선 사용
      let h = null;
      if (typeof e.webkitCompassHeading === 'number') {
        h = e.webkitCompassHeading;
      } else if (typeof e.alpha === 'number') {
        h = 360 - e.alpha;
      }
      if (h !== null) headingDeg = h;
    }

    function initOrientation() {
      // iOS는 권한 요청 필요. 안드로이드는 바로 동작
      if (typeof DeviceOrientationEvent !== 'undefined'
          && typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission()
          .then(state => {
            if (state === 'granted') {
              window.addEventListener('deviceorientation', onDeviceOrientation);
              log('방향 센서 권한 허용됨');
            } else {
              log('방향 센서 권한 거부 — 추적 제한됨');
            }
          })
          .catch(() => log('방향 센서 요청 실패'));
      } else {
        window.addEventListener('deviceorientation', onDeviceOrientation);
        log('방향 센서 연결됨');
      }
    }

    // 두 각도의 최소 차이 (-180 ~ 180)
    function angleDiff(a, b) {
      let d = (a - b) % 360;
      if (d > 180) d -= 360;
      if (d < -180) d += 360;
      return d;
    }

    // 현재 폰 정면 기준, 객체의 상대 각도(도). 왼쪽이 음수, 오른쪽이 양수
    function currentRelativeAngle() {
      if (objectWorldAngle === null || headingDeg === null) return null;
      return angleDiff(objectWorldAngle, headingDeg);
    }

    // ── 연속 가이드 톤 ──
    let tonePanner = null;

    function startTone(azDeg) {
      stopTone();
      tonePanner = makePanner(azDeg || 0, 4);
      toneOsc = audioCtx.createOscillator();
      toneGain = audioCtx.createGain();
      toneOsc.type = 'sine';
      toneOsc.frequency.value = 700;
      toneGain.gain.value = 0;
      toneOsc.connect(toneGain);
      toneGain.connect(tonePanner);
      tonePanner.connect(masterGain);
      toneOsc.start();
      toneGain.gain.linearRampToValueAtTime(0.16, audioCtx.currentTime + 0.1);
    }

    function stopTone() {
      if (toneOsc) {
        try {
          toneGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
          toneOsc.stop(audioCtx.currentTime + 0.2);
        } catch (e) {}
        toneOsc = null;
        toneGain = null;
        tonePanner = null;
      }
    }

    // 톤의 방향을 현재 객체 각도로 갱신 + 정면에 가까울수록 음높이 상승
    function updateTone(azDeg) {
      if (!toneOsc || !tonePanner) return;
      const pos = azToPosition(azDeg, 4);
      if (tonePanner.positionX) {
        tonePanner.positionX.setTargetAtTime(pos.x, audioCtx.currentTime, 0.05);
        tonePanner.positionY.setTargetAtTime(pos.y, audioCtx.currentTime, 0.05);
        tonePanner.positionZ.setTargetAtTime(pos.z, audioCtx.currentTime, 0.05);
      } else {
        tonePanner.setPosition(pos.x, pos.y, pos.z);
      }
      const closeness = Math.max(0, 1 - Math.abs(azDeg) / 90);
      toneOsc.frequency.setTargetAtTime(
        600 + closeness * 700, audioCtx.currentTime, 0.1);
    }

    function captureFrameBase64() {
      captureCtx.drawImage(video, 0, 0, captureCanvas.width, captureCanvas.height);
      const dataUrl = captureCanvas.toDataURL('image/jpeg', 0.8);
      return dataUrl.split(',')[1];
    }

    async function askGemini(objectQuery, base64Image) {
      const url = 'https://generativelanguage.googleapis.com/v1beta/models/'
        + GEMINI_MODEL + ':generateContent';

      const prompt =
        '이 이미지에서 사용자가 찾는 물체를 정확히 한 개 찾아주세요. '
        + '사용자가 찾는 것: "' + objectQuery + '"\n\n'
        + '그 물체가 보이면 화면에서의 위치를 정밀하게 알려주세요. '
        + '여러 개 있으면 사용자 의도에 가장 잘 맞는, 가장 크고 명확한 것 하나만 고르세요.\n\n'
        + '반드시 아래 JSON 형식으로만 답하세요. 다른 설명은 절대 쓰지 마세요:\n'
        + '{"found": true, "cx": 0.0~1.0, "cy": 0.0~1.0, "w": 0.0~1.0, "h": 0.0~1.0, '
        + '"proximity": "near"|"mid"|"far", "label": "물체이름"}\n'
        + 'cx, cy는 물체 중심의 좌표 비율(왼쪽 위가 0,0 / 오른쪽 아래가 1,1). '
        + 'w, h는 물체 박스의 너비와 높이 비율. '
        + 'proximity는 물체가 화면에서 차지하는 크기로 본 거리감: '
        + '크게 보이면 near, 중간이면 mid, 작게 보이면 far.\n'
        + '물체가 안 보이면: {"found": false}';

      const body = {
        contents: [{
          parts: [
            { text: prompt },
            { inline_data: { mime_type: 'image/jpeg', data: base64Image } }
          ]
        }],
        generationConfig: {
          temperature: 0.1,
          maxOutputTokens: 600,
          thinkingConfig: { thinkingBudget: 128 }
        }
      };

      const resp = await fetch(url, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-goog-api-key': API_KEY
        },
        body: JSON.stringify(body)
      });

      if (!resp.ok) {
        const errText = await resp.text();
        throw new Error('HTTP ' + resp.status + ': ' + errText.slice(0, 200));
      }

      const data = await resp.json();
      const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || '';
      if (!text) {
        throw new Error('빈 응답: ' + JSON.stringify(data).slice(0, 200));
      }
      const cleaned = text.replace(/```json/gi, '').replace(/```/g, '').trim();
      const match = cleaned.match(/\{[\s\S]*\}/);
      if (!match) throw new Error('JSON 파싱 실패: ' + cleaned.slice(0, 100));
      return JSON.parse(match[0]);
    }

    function drawGeminiBox(result) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (!result || !result.found) return;
      const x = (result.cx - result.w / 2) * canvas.width;
      const y = (result.cy - result.h / 2) * canvas.height;
      const w = result.w * canvas.width;
      const h = result.h * canvas.height;
      ctx.strokeStyle = '#00e5ff';
      ctx.lineWidth = 4;
      ctx.shadowColor = '#00e5ff';
      ctx.shadowBlur = 12;
      ctx.strokeRect(x, y, w, h);
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#00e5ff';
      ctx.font = 'bold 20px sans-serif';
      ctx.fillText(result.label || '타겟', x + 4, y - 8 > 20 ? y - 8 : y + 24);
    }

    function azimuthFromCx(cx) {
      const normalized = (cx - 0.5) * 2;
      return normalized * (ASSUMED_HORIZONTAL_FOV_DEG / 2);
    }

    function initSpeechRecognition() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) { log('음성 인식 미지원'); return false; }
      recognition = new SR();
      recognition.lang = 'ko-KR';
      recognition.continuous = false;
      recognition.interimResults = true;
      recognition.maxAlternatives = 3;
      recognition.onstart = () => {
        isListening = true;
        commandHandled = false;
        micIndicator.className = 'listening';
        micBtn.classList.add('listening');
        micBtn.textContent = '🔴 듣는 중...';
        playChimeAt(0, 660, 120);
      };
      recognition.onresult = (event) => {
        let final = '', interim = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const t = event.results[i][0].transcript;
          if (event.results[i].isFinal) final += t; else interim += t;
        }
        const shown = (final || interim).trim();
        heardEl.textContent = shown;

        if (final && !commandHandled) {
          commandHandled = true;
          if (earlyFinalizeTimer) { clearTimeout(earlyFinalizeTimer); earlyFinalizeTimer = null; }
          try { recognition.stop(); } catch (e) {}
          handleVoiceCommand(final.trim());
          return;
        }

        // interim이 0.7초간 변하지 않으면 조기 확정 (브라우저 종료 대기 단축)
        if (interim && !commandHandled) {
          if (earlyFinalizeTimer) clearTimeout(earlyFinalizeTimer);
          const snapshot = interim.trim();
          earlyFinalizeTimer = setTimeout(() => {
            if (commandHandled) return;
            commandHandled = true;
            try { recognition.stop(); } catch (e) {}
            handleVoiceCommand(snapshot);
          }, 700);
        }
      };
      recognition.onerror = (event) => {
        log('음성 오류: ' + event.error);
        stopListening();
        if (event.error === 'not-allowed') alert('마이크 권한이 필요합니다');
      };
      recognition.onend = () => stopListening();
      return true;
    }

    function startListening() {
      if (!recognition || isListening || isThinking) return;
      heardEl.textContent = '';
      try { recognition.start(); }
      catch (e) { log('인식 시작 실패: ' + e.message); }
    }

    function stopListening() {
      isListening = false;
      if (earlyFinalizeTimer) { clearTimeout(earlyFinalizeTimer); earlyFinalizeTimer = null; }
      micBtn.classList.remove('listening');
      micBtn.textContent = '🎤 말하기';
      if (!isThinking) micIndicator.className = '';
    }

    async function handleVoiceCommand(text) {
      const now = Date.now();
      const normalized = text.trim();

      if (isThinking) {
        log('분석 중 — 명령 무시: "' + normalized + '"');
        return;
      }
      if (now - lastCommandTime < COMMAND_COOLDOWN_MS) {
        log('쿨다운 — 명령 무시: "' + normalized + '"');
        return;
      }
      if (normalized === lastCommandText && now - lastCommandTime < 8000) {
        log('직전과 동일 — 명령 무시');
        return;
      }
      lastCommandTime = now;
      lastCommandText = normalized;

      log('들음: "' + normalized + '"');
      const lower = normalized.toLowerCase().replace(/[?!.,]/g, '');

      for (const sw of STOP_KEYWORDS) {
        if (lower.includes(sw)) {
          stopTrackingGuide();
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          targetEl.textContent = '-';
          angleEl.textContent = '-';
          speakAt('중단했어요', 0);
          return;
        }
      }

      let query = normalized;
      query = query.replace(/(어디( ?있어| ?니| ?야)?|찾아( ?줘)?|어딨어|보여( ?줘)?)\s*$/g, '').trim();
      if (!query) {
        speakAt('무엇을 찾을까요', 0);
        return;
      }

      stopTrackingGuide();

      const quota = checkQuota();
      if (!quota.ok) {
        const sec = Math.ceil(quota.waitMs / 1000);
        if (quota.reason === 'rpm') {
          log('분당 한도 임박 — ' + sec + '초 후 가능');
          speakAt('잠깐 쉬어야 해요. ' + sec + '초 후에 다시 말씀해주세요', 0);
        } else {
          log('요청 간격 — ' + sec + '초 후 가능');
          speakAt(sec + '초 후에 다시 말씀해주세요', 0);
        }
        startCooldownDisplay();
        return;
      }

      targetEl.textContent = query;
      angleEl.textContent = '...';
      isThinking = true;
      micIndicator.className = 'thinking';
      stateEl.textContent = '분석 중';
      speakAt(query + ' 찾고 있어요', 0);

      try {
        const base64 = captureFrameBase64();
        const t0 = performance.now();
        let result = null;
        let attempt = 0;
        while (attempt <= RETRY_DELAYS_MS.length) {
          try {
            recordApiCall();
            updateQuotaDisplay();
            result = await askGemini(query, base64);
            break;
          } catch (err) {
            if (err.message.includes('429') && attempt < RETRY_DELAYS_MS.length) {
              const delay = RETRY_DELAYS_MS[attempt];
              log('429 — ' + (delay / 1000) + '초 후 재시도 (' + (attempt + 1) + ')');
              speakAt('잠시만요', 0);
              await new Promise(r => setTimeout(r, delay));
              attempt++;
            } else {
              throw err;
            }
          }
        }
        const elapsed = Math.round(performance.now() - t0);
        log('Gemini 응답: ' + elapsed + 'ms');

        drawGeminiBox(result);

        if (!result) {
          angleEl.textContent = '오류';
          speakAt('응답을 받지 못했어요', 0);
        } else if (!result.found) {
          angleEl.textContent = '못 찾음';
          speakAt(query + '을 찾지 못했어요. 다른 쪽을 비춰주세요', 0);
        } else {
          const az = azimuthFromCx(result.cx);
          startTrackingGuide(az, result.label || query, query, result.proximity);
        }
      } catch (e) {
        log('Gemini 오류: ' + e.message);
        angleEl.textContent = '오류';
        if (e.message.includes('403') || e.message.includes('400')) {
          speakAt('API 키에 문제가 있어요', 0);
        } else if (e.message.includes('429')) {
          speakAt('무료 사용량 한도에 도달했어요. 일분쯤 기다려주세요', 0);
        } else if (e.message.includes('404')) {
          speakAt('모델을 찾을 수 없어요. 코드 확인이 필요해요', 0);
        } else {
          speakAt('분석 중 오류가 났어요', 0);
        }
      } finally {
        isThinking = false;
        micIndicator.className = '';
        stateEl.textContent = '준비됨';
        updateQuotaDisplay();
        startCooldownDisplay();
      }
    }

    function startCooldownDisplay() {
      if (cooldownTimerId) clearInterval(cooldownTimerId);
      cooldownTimerId = setInterval(() => {
        updateQuotaDisplay();
        const gap = Date.now() - lastApiCallTime;
        if (gap >= MIN_GAP_MS && recentApiCalls() < RPM_SOFT_LIMIT) {
          clearInterval(cooldownTimerId);
          cooldownTimerId = null;
        }
      }, 1000);
    }

    // ── 추적 가이드 (Gemini 폴링 + 자이로 보간) ──
    const FEEDBACK_COOLDOWN_MS = 1800;
    const TREND_THRESHOLD_DEG = 6;

    let pollTimerId = null;
    let currentAngle = null;
    let lastHeadingAtPoll = null;
    let proximity = 'mid';
    let lostCount = 0;

    function startTrackingGuide(initialAz, label, query, prox) {
      stopTrackingGuide();
      currentLabel = label;
      currentQuery = query || label;
      proximity = prox || 'mid';

      currentAngle = initialAz;
      lastHeadingAtPoll = headingDeg;
      startAbsAngle = Math.abs(initialAz);
      lastAbsAngle = Math.abs(initialAz);
      guidePhase = 1;
      trackStartTime = Date.now();
      lastFeedbackTime = Date.now();
      lostCount = 0;

      const clamped0 = Math.max(-MAX_AZIMUTH_DEG, Math.min(MAX_AZIMUTH_DEG, initialAz));
      angleEl.textContent = (initialAz >= 0 ? '+' : '') + initialAz.toFixed(0) + '°';

      // 1단계: 객체 방향에서 "여기 있어요"
      playVoiceAt('here', clamped0, { distance: distanceForProximity() });
      log('가이드 시작: ' + label + ' @ ' + initialAz.toFixed(0) + '° (' + proximity + ')');

      setTimeout(() => {
        if (guidePhase === 0) return;
        startTone(clamped0);
        runTrackLoop();
        runPollLoop();
      }, 1500);
    }

    function distanceForProximity() {
      if (proximity === 'near') return 2.5;
      if (proximity === 'far') return 6;
      return 4;
    }

    // 빠른 루프: 자이로로 각도 보간 + 음향 갱신 + Yes/No 판정
    function runTrackLoop() {
      trackTimerId = setInterval(() => {
        if (currentAngle === null) return;

        // 마지막 폴링 이후 폰이 회전한 만큼 각도 보정 (보간)
        let rel = currentAngle;
        if (headingDeg !== null && lastHeadingAtPoll !== null) {
          rel = currentAngle - angleDiff(headingDeg, lastHeadingAtPoll);
        }
        const absRel = Math.abs(rel);
        const clamped = Math.max(-MAX_AZIMUTH_DEG, Math.min(MAX_AZIMUTH_DEG, rel));
        const now = Date.now();

        updateTone(clamped);
        angleEl.textContent = (rel >= 0 ? '+' : '') + rel.toFixed(0) + '°';

        // 3단계: 정면 도착
        if (absRel <= ARRIVAL_THRESHOLD_DEG && guidePhase < 3) {
          guidePhase = 3;
          stopTone();
          playChimeAt(0, 1320, 240);
          setTimeout(() => playVoiceAt('bingo', 0, { distance: 2 }), 260);
          log('도착: ' + currentLabel);
          setTimeout(() => stopTrackingGuide(), 1800);
          return;
        }

        // Yes/No 판정
        if (guidePhase < 3 && now - lastFeedbackTime > FEEDBACK_COOLDOWN_MS) {
          const delta = absRel - lastAbsAngle;
          if (delta < -TREND_THRESHOLD_DEG) {
            playVoiceAt('yes', clamped, { distance: distanceForProximity() });
            log('Yes — ' + lastAbsAngle.toFixed(0) + '→' + absRel.toFixed(0));
            lastFeedbackTime = now;
            lastAbsAngle = absRel;
            guidePhase = 2;
          } else if (delta > TREND_THRESHOLD_DEG) {
            playVoiceAt('no', clamped, { distance: distanceForProximity() });
            log('No — ' + lastAbsAngle.toFixed(0) + '→' + absRel.toFixed(0));
            lastFeedbackTime = now;
            lastAbsAngle = absRel;
          }
        }
      }, TRACK_INTERVAL_MS);
    }

    // 느린 루프: 1.5초마다 Gemini로 객체 실제 위치 갱신
    function runPollLoop() {
      pollTimerId = setInterval(async () => {
        if (guidePhase === 0 || guidePhase >= 3) return;
        if (reanchorInProgress) return;
        reanchorInProgress = true;
        try {
          const base64 = captureFrameBase64();
          recordApiCall();
          updateQuotaDisplay();
          const result = await askGemini(currentQuery, base64);

          if (result && result.found) {
            lostCount = 0;
            const az = azimuthFromCx(result.cx);
            currentAngle = az;
            lastHeadingAtPoll = headingDeg;
            if (result.proximity) proximity = result.proximity;
            drawGeminiBox(result);
          } else {
            lostCount++;
            log('폴링: 객체 안 보임 (' + lostCount + ')');
            // 객체가 화면 밖 — 마지막 방향에서 No로 "돌아와요"
            if (lostCount >= 1 && guidePhase < 3) {
              const back = currentAngle || 0;
              const clampedBack = Math.max(-MAX_AZIMUTH_DEG,
                Math.min(MAX_AZIMUTH_DEG, back));
              playVoiceAt('no', clampedBack, { distance: 5 });
            }
          }
        } catch (e) {
          log('폴링 오류: ' + e.message);
        } finally {
          reanchorInProgress = false;
        }
      }, POLL_INTERVAL_MS);
    }

    function stopTrackingGuide() {
      if (trackTimerId) { clearInterval(trackTimerId); trackTimerId = null; }
      if (pollTimerId) { clearInterval(pollTimerId); pollTimerId = null; }
      stopTone();
      guidePhase = 0;
      currentAngle = null;
      lastHeadingAtPoll = null;
      startAbsAngle = null;
      lastAbsAngle = null;
      reanchorInProgress = false;
      lostCount = 0;
    }

    startBtn.addEventListener('click', async () => {
      if (!API_KEY) { alert('먼저 API 키를 입력하세요'); return; }
      startBtn.disabled = true;
      startBtn.textContent = '시작 중...';
      const camOk = await initCamera();
      if (!camOk) { startBtn.disabled = false; startBtn.textContent = '시작'; return; }
      await initAudio();
      initOrientation();
      stateEl.textContent = '음성 파일 로딩 중';
      const voiceOk = await loadVoiceFiles();
      if (!voiceOk) {
        log('일부 음성 파일 누락 — 경로 확인 필요 (audio/ 폴더)');
      }
      const srOk = initSpeechRecognition();
      micBtn.disabled = !srOk;
      stateEl.textContent = '준비됨';
      startBtn.textContent = '실행 중';
      log('가동 완료 — 모델: ' + GEMINI_MODEL);
      speechSynthesis.getVoices();
      updateQuotaDisplay();
      setTimeout(() => speakAt('준비됐어요. 무엇을 찾아드릴까요', 0), 500);
    });

    micBtn.addEventListener('click', () => {
      if (!audioCtx) { alert('먼저 시작 버튼을 눌러주세요'); return; }
      if (isThinking) return;
      isListening ? recognition.stop() : startListening();
    });

    document.addEventListener('touchstart', () => {
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    }, { once: false });
  </script>
</body>
</html>
