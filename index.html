<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>공간음향 시선 가이드 v4 (Gemini)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000; color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden; touch-action: none; -webkit-user-select: none; user-select: none; }
    #video-container { position: relative; width: 100%; height: 100%; }
    video { width: 100%; height: 100%; object-fit: cover; }
    canvas#overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; }
    #ui { position: absolute; top: 0; left: 0; right: 0; padding: 14px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.78), transparent);
      pointer-events: none; z-index: 10; }
    #status { font-size: 13px; line-height: 1.6; }
    #status .label { color: #888; }
    #status .value { color: #fff; font-weight: 500; }
    #mic-indicator { display: inline-block; width: 10px; height: 10px;
      border-radius: 50%; background: #555; margin-left: 6px; vertical-align: middle; }
    #mic-indicator.listening { background: #ff3b30; animation: pulse 1s infinite; }
    #mic-indicator.thinking { background: #ffaa00; animation: pulse 0.6s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    #heard { color: #ffcc00; font-style: italic; margin-top: 2px; min-height: 18px; }
    #crosshair { position: absolute; left: 50%; top: 50%; width: 2px; height: 2px;
      background: rgba(255,255,255,0.6); transform: translate(-50%, -50%);
      box-shadow: 0 0 0 14px rgba(255,255,255,0.08); border-radius: 50%;
      pointer-events: none; z-index: 5; }
    #controls { position: absolute; bottom: 0; left: 0; right: 0; padding: 14px;
      background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
      display: flex; flex-direction: column; gap: 9px; z-index: 10; }
    .row { display: flex; gap: 8px; align-items: center; }
    button { flex: 1; padding: 13px; background: rgba(255,255,255,0.15); color: #fff;
      border: 1px solid rgba(255,255,255,0.3); border-radius: 8px;
      font-size: 14px; font-weight: 500; cursor: pointer;
      -webkit-tap-highlight-color: transparent; }
    button:active { background: rgba(255,255,255,0.3); }
    button.primary { background: #4a8cf7; border-color: #4a8cf7; }
    button.listening { background: #ff3b30; border-color: #ff3b30; }
    button:disabled { opacity: 0.4; }
    #mic-btn { flex: 2; font-size: 15px; padding: 16px; }
    #log { font-size: 11px; max-height: 44px; overflow-y: auto;
      color: #aaa; line-height: 1.4; }
    #hint { font-size: 12px; color: #aaa; text-align: center;
      padding: 6px; background: rgba(255,255,255,0.05); border-radius: 6px; }
    #key-panel { position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: #111; z-index: 100; padding: 24px;
      display: flex; flex-direction: column; justify-content: center; gap: 14px; }
    #key-panel h2 { font-size: 18px; font-weight: 500; }
    #key-panel p { font-size: 13px; color: #aaa; line-height: 1.6; }
    #key-panel a { color: #6ab0ff; }
    #key-input { padding: 14px; font-size: 14px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1);
      color: #fff; }
    #key-save { padding: 14px; background: #4a8cf7; border: none;
      border-radius: 8px; color: #fff; font-size: 15px; font-weight: 500; }
    .gemini-box { position: absolute; border: 3px solid #00e5ff;
      box-shadow: 0 0 12px rgba(0,229,255,0.6); pointer-events: none;
      z-index: 6; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="key-panel">
    <h2>Gemini API 키 입력</h2>
    <p><a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a>
       에서 무료로 발급받은 키를 붙여넣으세요. 키는 이 기기의 브라우저에만 저장되고
       외부나 깃허브로 전송되지 않습니다. 한 번 저장하면 다음부터 자동으로 불러옵니다.</p>
    <input type="password" id="key-input" placeholder="AIza... 로 시작하는 키" autocomplete="off">
    <label style="font-size:13px;color:#bbb;display:flex;align-items:center;gap:8px">
      <input type="checkbox" id="key-remember" checked style="width:18px;height:18px">
      이 기기에 키 저장 (다음부터 자동 입력)
    </label>
    <button id="key-save">저장하고 시작</button>
    <button id="key-clear" style="background:rgba(255,255,255,0.1);font-size:13px;padding:10px">
      저장된 키 지우기
    </button>
  </div>

  <div id="video-container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
    <div id="crosshair"></div>
  </div>

  <div id="ui">
    <div id="status">
      <div><span class="label">상태:</span> <span class="value" id="state">대기</span>
        <span id="mic-indicator"></span></div>
      <div><span class="label">찾는 중:</span> <span class="value" id="target">-</span>
        <span class="label"> 방향:</span> <span class="value" id="angle">-</span></div>
      <div id="perf" style="font-size:11px;color:#6c6;margin-top:2px">분당 남은 호출: -</div>
      <div id="heard"></div>
    </div>
  </div>

  <div id="controls">
    <div id="hint">예: "파란 텀블러 어디", "내 안경", "리모컨 찾아", "그만"</div>
    <div id="log"></div>
    <div class="row">
      <button id="start-btn" class="primary">시작</button>
      <button id="mic-btn" disabled>🎤 말하기</button>
    </div>
  </div>

  <script>
    const KEY_PANEL = document.getElementById('key-panel');
    const KEY_INPUT = document.getElementById('key-input');
    const KEY_SAVE = document.getElementById('key-save');
    const KEY_CLEAR = document.getElementById('key-clear');
    const KEY_REMEMBER = document.getElementById('key-remember');
    const video = document.getElementById('video');
    const canvas = document.getElementById('overlay');
    const ctx = canvas.getContext('2d');
    const stateEl = document.getElementById('state');
    const targetEl = document.getElementById('target');
    const angleEl = document.getElementById('angle');
    const heardEl = document.getElementById('heard');
    const micIndicator = document.getElementById('mic-indicator');
    const startBtn = document.getElementById('start-btn');
    const micBtn = document.getElementById('mic-btn');
    const logEl = document.getElementById('log');
    const perfEl = document.getElementById('perf');

    const ASSUMED_HORIZONTAL_FOV_DEG = 65;
    const MAX_AZIMUTH_DEG = 60;
    const ARRIVAL_THRESHOLD_DEG = 8;
    const GEMINI_MODEL = 'gemini-2.5-flash';
    const CAPTURE_WIDTH = 768;
    const COMMAND_COOLDOWN_MS = 4000;

    const MIN_GAP_MS = 12000;
    const RPM_SOFT_LIMIT = 10;
    const RPM_WINDOW_MS = 60000;
    const RETRY_DELAYS_MS = [6000, 15000];

    let API_KEY = '';
    let model = null;
    let stream = null;
    let audioCtx = null;
    let panner = null;
    let masterGain = null;
    let recognition = null;
    let isListening = false;
    let isThinking = false;
    let captureCanvas = null;
    let captureCtx = null;

    let lastCommandTime = 0;
    let lastCommandText = '';
    let commandHandled = false;

    let lastApiCallTime = 0;
    let apiCallTimestamps = [];
    let cooldownTimerId = null;

    const STOP_KEYWORDS = ['그만', '중지', '멈춰', '취소', '중단'];

    function log(msg) {
      const now = new Date().toTimeString().slice(0, 8);
      logEl.innerHTML = `[${now}] ${msg}<br>` + logEl.innerHTML;
      if (logEl.innerHTML.length > 600) logEl.innerHTML = logEl.innerHTML.slice(0, 600);
    }

    function recentApiCalls() {
      const now = Date.now();
      apiCallTimestamps = apiCallTimestamps.filter(t => now - t < RPM_WINDOW_MS);
      return apiCallTimestamps.length;
    }

    function recordApiCall() {
      apiCallTimestamps.push(Date.now());
      lastApiCallTime = Date.now();
    }

    // 호출 가능 여부 판정. 가능하면 {ok:true}, 아니면 {ok:false, waitMs, reason}
    function checkQuota() {
      const now = Date.now();
      const gap = now - lastApiCallTime;
      if (lastApiCallTime > 0 && gap < MIN_GAP_MS) {
        return { ok: false, waitMs: MIN_GAP_MS - gap, reason: 'gap' };
      }
      if (recentApiCalls() >= RPM_SOFT_LIMIT) {
        const oldest = apiCallTimestamps[0];
        return { ok: false, waitMs: RPM_WINDOW_MS - (now - oldest), reason: 'rpm' };
      }
      return { ok: true };
    }

    function updateQuotaDisplay() {
      const used = recentApiCalls();
      const remaining = Math.max(0, RPM_SOFT_LIMIT - used);
      const gap = Date.now() - lastApiCallTime;
      let txt = '분당 남은 호출: ' + remaining + '/' + RPM_SOFT_LIMIT;
      if (lastApiCallTime > 0 && gap < MIN_GAP_MS) {
        txt += ' | 다음 요청까지 ' + Math.ceil((MIN_GAP_MS - gap) / 1000) + '초';
      } else {
        txt += ' | 지금 요청 가능';
      }
      perfEl.textContent = txt;
    }

    const STORAGE_KEY = 'spatial_guide_gemini_key';

    function loadSavedKey() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved && saved.startsWith('AIza')) {
          KEY_INPUT.value = saved;
          log('저장된 키 불러옴');
          return saved;
        }
      } catch (e) { }
      return '';
    }

    async function verifyKey(k) {
      const resp = await fetch(
        'https://generativelanguage.googleapis.com/v1beta/models',
        { headers: { 'x-goog-api-key': k } }
      );
      if (!resp.ok) {
        const t = await resp.text();
        throw new Error('HTTP ' + resp.status + ': ' + t.slice(0, 200));
      }
      const data = await resp.json();
      return Array.isArray(data.models) ? data.models.length : 0;
    }

    KEY_SAVE.addEventListener('click', async () => {
      const k = KEY_INPUT.value.trim();
      if (!k.startsWith('AIza')) {
        alert('키는 보통 AIza로 시작합니다. 다시 확인해주세요.');
        return;
      }
      KEY_SAVE.disabled = true;
      KEY_SAVE.textContent = '키 확인 중...';
      try {
        const count = await verifyKey(k);
        log('키 검증 성공 — 사용 가능 모델 ' + count + '개');
        API_KEY = k;
        try {
          if (KEY_REMEMBER.checked) localStorage.setItem(STORAGE_KEY, k);
          else localStorage.removeItem(STORAGE_KEY);
        } catch (e) {
          alert('키 저장 실패 (브라우저 저장소 비활성). 이번 세션만 사용됩니다.');
        }
        KEY_PANEL.style.display = 'none';
      } catch (e) {
        let hint = e.message;
        if (e.message.includes('400') || e.message.toLowerCase().includes('not valid'))
          hint = '키가 유효하지 않습니다. 복사가 깨졌는지 확인하거나 새로 발급하세요.';
        else if (e.message.includes('403'))
          hint = '키 권한 문제입니다. AI Studio에서 Generative Language API가 켜져 있는지 확인하세요.';
        alert('키 검증 실패:\n' + hint);
        log('키 검증 실패: ' + e.message);
      } finally {
        KEY_SAVE.disabled = false;
        KEY_SAVE.textContent = '저장하고 시작';
      }
    });

    KEY_CLEAR.addEventListener('click', () => {
      try { localStorage.removeItem(STORAGE_KEY); } catch (e) { }
      KEY_INPUT.value = '';
      API_KEY = '';
      alert('저장된 키를 지웠습니다.');
    });

    const savedKey = loadSavedKey();
    if (savedKey) {
      API_KEY = savedKey;
      KEY_PANEL.style.display = 'none';
    }

    async function initCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: 'environment' },
            width: { ideal: 1920 }, height: { ideal: 1080 }
          },
          audio: false
        });
        video.srcObject = stream;
        await new Promise(res => { video.onloadedmetadata = res; });
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        const track = stream.getVideoTracks()[0];
        if (track && track.applyConstraints) {
          try {
            const caps = track.getCapabilities ? track.getCapabilities() : {};
            if (caps.focusMode && caps.focusMode.includes('continuous'))
              await track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] });
          } catch (e) {}
        }

        captureCanvas = document.createElement('canvas');
        const ratio = video.videoHeight / video.videoWidth;
        captureCanvas.width = CAPTURE_WIDTH;
        captureCanvas.height = Math.round(CAPTURE_WIDTH * ratio);
        captureCtx = captureCanvas.getContext('2d');

        log('카메라: ' + video.videoWidth + 'x' + video.videoHeight);
        return true;
      } catch (e) {
        log('카메라 오류: ' + e.message);
        alert('카메라 접근 실패: ' + e.message);
        return false;
      }
    }

    async function initAudio() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 1.0;
      panner = audioCtx.createPanner();
      panner.panningModel = 'HRTF';
      panner.distanceModel = 'inverse';
      panner.refDistance = 1;
      panner.maxDistance = 10;
      panner.rolloffFactor = 1;
      panner.connect(masterGain);
      masterGain.connect(audioCtx.destination);
      const l = audioCtx.listener;
      if (l.positionX) {
        l.positionX.value = 0; l.positionY.value = 0; l.positionZ.value = 0;
        l.forwardX.value = 0; l.forwardY.value = 0; l.forwardZ.value = -1;
        l.upX.value = 0; l.upY.value = 1; l.upZ.value = 0;
      } else {
        l.setPosition(0, 0, 0);
        l.setOrientation(0, 0, -1, 0, 1, 0);
      }
      log('오디오 준비됨');
    }

    function setPannerAzimuth(azDeg, distance = 2) {
      const az = azDeg * Math.PI / 180;
      const x = Math.sin(az) * distance;
      const z = -Math.cos(az) * distance;
      if (panner.positionX) {
        panner.positionX.setValueAtTime(x, audioCtx.currentTime);
        panner.positionY.setValueAtTime(0, audioCtx.currentTime);
        panner.positionZ.setValueAtTime(z, audioCtx.currentTime);
      } else {
        panner.setPosition(x, 0, z);
      }
    }

    function speakAt(text, azimuthDeg) {
      setPannerAzimuth(azimuthDeg);
      const utter = new SpeechSynthesisUtterance(text);
      const voices = speechSynthesis.getVoices();
      const ko = voices.find(v => v.lang.startsWith('ko'));
      if (ko) utter.voice = ko;
      utter.rate = 1.1;
      speechSynthesis.cancel();
      speechSynthesis.speak(utter);
    }

    function playChimeAt(azimuthDeg, freq = 880, durationMs = 280) {
      setPannerAzimuth(azimuthDeg, 1.5);
      const osc = audioCtx.createOscillator();
      const env = audioCtx.createGain();
      osc.frequency.value = freq;
      osc.type = 'sine';
      env.gain.setValueAtTime(0, audioCtx.currentTime);
      env.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 0.02);
      env.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + durationMs / 1000);
      osc.connect(env);
      env.connect(panner);
      osc.start();
      osc.stop(audioCtx.currentTime + durationMs / 1000 + 0.05);
    }

    function captureFrameBase64() {
      captureCtx.drawImage(video, 0, 0, captureCanvas.width, captureCanvas.height);
      const dataUrl = captureCanvas.toDataURL('image/jpeg', 0.8);
      return dataUrl.split(',')[1];
    }

    async function askGemini(objectQuery, base64Image) {
      const url = 'https://generativelanguage.googleapis.com/v1beta/models/'
        + GEMINI_MODEL + ':generateContent';

      const prompt =
        '이 이미지에서 사용자가 찾는 물체를 한 개 찾아주세요. '
        + '사용자가 찾는 것: "' + objectQuery + '"\n'
        + '여러 개 있으면 가장 크고 명확하게 보이는 것 하나만 고르세요.\n'
        + 'found: 물체가 보이면 true, 안 보이면 false.\n'
        + 'cx, cy: 물체 중심의 좌표 비율. 이미지 왼쪽 끝이 0, 오른쪽 끝이 1 (cx). '
        + '위쪽 끝이 0, 아래쪽 끝이 1 (cy).\n'
        + 'w, h: 물체 박스의 너비와 높이 비율 (0에서 1 사이).\n'
        + 'label: 찾은 물체의 짧은 한국어 이름.';

      const responseSchema = {
        type: 'OBJECT',
        properties: {
          found: { type: 'BOOLEAN' },
          cx: { type: 'NUMBER' },
          cy: { type: 'NUMBER' },
          w: { type: 'NUMBER' },
          h: { type: 'NUMBER' },
          label: { type: 'STRING' }
        },
        required: ['found', 'cx', 'cy', 'w', 'h', 'label']
      };

      const body = {
        contents: [{
          parts: [
            { text: prompt },
            { inline_data: { mime_type: 'image/jpeg', data: base64Image } }
          ]
        }],
        generationConfig: {
          temperature: 0.1,
          maxOutputTokens: 2048,
          responseMimeType: 'application/json',
          responseSchema: responseSchema
        }
      };

      const resp = await fetch(url, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-goog-api-key': API_KEY
        },
        body: JSON.stringify(body)
      });

      if (!resp.ok) {
        const errText = await resp.text();
        throw new Error('HTTP ' + resp.status + ': ' + errText.slice(0, 200));
      }

      const data = await resp.json();
      const cand = data?.candidates?.[0];
      const text = cand?.content?.parts?.[0]?.text || '';

      if (!text) {
        const finishReason = cand?.finishReason || '알수없음';
        throw new Error('빈 응답 (finishReason: ' + finishReason + ')');
      }

      try {
        return JSON.parse(text);
      } catch (e) {
        // 구조화 출력이 잘렸을 경우 대비: 마지막 } 까지만 잘라 재시도
        const lastBrace = text.lastIndexOf('}');
        if (lastBrace > 0) {
          try { return JSON.parse(text.slice(0, lastBrace + 1)); }
          catch (e2) {}
        }
        throw new Error('JSON 파싱 실패: ' + text.slice(0, 120));
      }
    }

    function drawGeminiBox(result) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (!result || !result.found) return;
      const x = (result.cx - result.w / 2) * canvas.width;
      const y = (result.cy - result.h / 2) * canvas.height;
      const w = result.w * canvas.width;
      const h = result.h * canvas.height;
      ctx.strokeStyle = '#00e5ff';
      ctx.lineWidth = 4;
      ctx.shadowColor = '#00e5ff';
      ctx.shadowBlur = 12;
      ctx.strokeRect(x, y, w, h);
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#00e5ff';
      ctx.font = 'bold 20px sans-serif';
      ctx.fillText(result.label || '타겟', x + 4, y - 8 > 20 ? y - 8 : y + 24);
    }

    function azimuthFromCx(cx) {
      const normalized = (cx - 0.5) * 2;
      return normalized * (ASSUMED_HORIZONTAL_FOV_DEG / 2);
    }

    function initSpeechRecognition() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) { log('음성 인식 미지원'); return false; }
      recognition = new SR();
      recognition.lang = 'ko-KR';
      recognition.continuous = false;
      recognition.interimResults = true;
      recognition.maxAlternatives = 3;
      recognition.onstart = () => {
        isListening = true;
        commandHandled = false;
        micIndicator.className = 'listening';
        micBtn.classList.add('listening');
        micBtn.textContent = '🔴 듣는 중...';
        playChimeAt(0, 660, 120);
      };
      recognition.onresult = (event) => {
        let final = '', interim = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const t = event.results[i][0].transcript;
          if (event.results[i].isFinal) final += t; else interim += t;
        }
        heardEl.textContent = (final || interim).trim();
        if (final && !commandHandled) {
          commandHandled = true;
          const finalText = final.trim();
          try { recognition.stop(); } catch (e) {}
          handleVoiceCommand(finalText);
        }
      };
      recognition.onerror = (event) => {
        log('음성 오류: ' + event.error);
        stopListening();
        if (event.error === 'not-allowed') alert('마이크 권한이 필요합니다');
      };
      recognition.onend = () => stopListening();
      return true;
    }

    function startListening() {
      if (!recognition || isListening || isThinking) return;
      heardEl.textContent = '';
      try { recognition.start(); }
      catch (e) { log('인식 시작 실패: ' + e.message); }
    }

    function stopListening() {
      isListening = false;
      micBtn.classList.remove('listening');
      micBtn.textContent = '🎤 말하기';
      if (!isThinking) micIndicator.className = '';
    }

    async function handleVoiceCommand(text) {
      const now = Date.now();
      const normalized = text.trim();

      if (isThinking) {
        log('분석 중 — 명령 무시: "' + normalized + '"');
        return;
      }
      if (now - lastCommandTime < COMMAND_COOLDOWN_MS) {
        log('쿨다운 — 명령 무시: "' + normalized + '"');
        return;
      }
      if (normalized === lastCommandText && now - lastCommandTime < 8000) {
        log('직전과 동일 — 명령 무시');
        return;
      }
      lastCommandTime = now;
      lastCommandText = normalized;

      log('들음: "' + normalized + '"');
      const lower = normalized.toLowerCase().replace(/[?!.,]/g, '');

      for (const sw of STOP_KEYWORDS) {
        if (lower.includes(sw)) {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          targetEl.textContent = '-';
          angleEl.textContent = '-';
          speakAt('중단했어요', 0);
          return;
        }
      }

      let query = normalized;
      query = query.replace(/(어디( ?있어| ?니| ?야)?|찾아( ?줘)?|어딨어|보여( ?줘)?)\s*$/g, '').trim();
      if (!query) {
        speakAt('무엇을 찾을까요', 0);
        return;
      }

      const quota = checkQuota();
      if (!quota.ok) {
        const sec = Math.ceil(quota.waitMs / 1000);
        if (quota.reason === 'rpm') {
          log('분당 한도 임박 — ' + sec + '초 후 가능');
          speakAt('잠깐 쉬어야 해요. ' + sec + '초 후에 다시 말씀해주세요', 0);
        } else {
          log('요청 간격 — ' + sec + '초 후 가능');
          speakAt(sec + '초 후에 다시 말씀해주세요', 0);
        }
        startCooldownDisplay();
        return;
      }

      targetEl.textContent = query;
      angleEl.textContent = '...';
      isThinking = true;
      micIndicator.className = 'thinking';
      stateEl.textContent = '분석 중';
      speakAt(query + ' 찾고 있어요', 0);

      try {
        const base64 = captureFrameBase64();
        const t0 = performance.now();
        let result = null;
        let attempt = 0;
        while (attempt <= RETRY_DELAYS_MS.length) {
          try {
            recordApiCall();
            updateQuotaDisplay();
            result = await askGemini(query, base64);
            break;
          } catch (err) {
            if (err.message.includes('429') && attempt < RETRY_DELAYS_MS.length) {
              const delay = RETRY_DELAYS_MS[attempt];
              log('429 — ' + (delay / 1000) + '초 후 재시도 (' + (attempt + 1) + ')');
              speakAt('잠시만요', 0);
              await new Promise(r => setTimeout(r, delay));
              attempt++;
            } else {
              throw err;
            }
          }
        }
        const elapsed = Math.round(performance.now() - t0);
        log('Gemini 응답: ' + elapsed + 'ms');

        drawGeminiBox(result);

        if (!result) {
          angleEl.textContent = '오류';
          speakAt('응답을 받지 못했어요', 0);
        } else if (!result.found) {
          angleEl.textContent = '못 찾음';
          speakAt(query + '을 찾지 못했어요. 다른 쪽을 비춰주세요', 0);
        } else {
          const az = azimuthFromCx(result.cx);
          const absAz = Math.abs(az);
          const clamped = Math.max(-MAX_AZIMUTH_DEG, Math.min(MAX_AZIMUTH_DEG, az));
          angleEl.textContent = (az >= 0 ? '+' : '') + az.toFixed(1) + '°';

          if (absAz <= ARRIVAL_THRESHOLD_DEG) {
            playChimeAt(0, 1320, 240);
            setTimeout(() => speakAt((result.label || query) + ' 정면에 있어요', 0), 260);
          } else {
            const dir = az < 0 ? '왼쪽' : '오른쪽';
            const msg = (result.label || query) + ' ' + dir + ' ' + Math.round(absAz) + '도';
            playChimeAt(clamped, 880, 200);
            setTimeout(() => speakAt(msg, clamped), 220);
          }
        }
      } catch (e) {
        log('Gemini 오류: ' + e.message);
        angleEl.textContent = '오류';
        if (e.message.includes('403') || e.message.includes('400')) {
          speakAt('API 키에 문제가 있어요', 0);
        } else if (e.message.includes('429')) {
          speakAt('무료 사용량 한도에 도달했어요. 일분쯤 기다려주세요', 0);
        } else if (e.message.includes('404')) {
          speakAt('모델을 찾을 수 없어요. 코드 확인이 필요해요', 0);
        } else {
          speakAt('분석 중 오류가 났어요', 0);
        }
      } finally {
        isThinking = false;
        micIndicator.className = '';
        stateEl.textContent = '준비됨';
        updateQuotaDisplay();
        startCooldownDisplay();
      }
    }

    function startCooldownDisplay() {
      if (cooldownTimerId) clearInterval(cooldownTimerId);
      cooldownTimerId = setInterval(() => {
        updateQuotaDisplay();
        const gap = Date.now() - lastApiCallTime;
        if (gap >= MIN_GAP_MS && recentApiCalls() < RPM_SOFT_LIMIT) {
          clearInterval(cooldownTimerId);
          cooldownTimerId = null;
        }
      }, 1000);
    }

    startBtn.addEventListener('click', async () => {
      if (!API_KEY) { alert('먼저 API 키를 입력하세요'); return; }
      startBtn.disabled = true;
      startBtn.textContent = '시작 중...';
      const camOk = await initCamera();
      if (!camOk) { startBtn.disabled = false; startBtn.textContent = '시작'; return; }
      await initAudio();
      const srOk = initSpeechRecognition();
      micBtn.disabled = !srOk;
      stateEl.textContent = '준비됨';
      startBtn.textContent = '실행 중';
      log('가동 완료 — 모델: ' + GEMINI_MODEL);
      speechSynthesis.getVoices();
      updateQuotaDisplay();
      setTimeout(() => speakAt('준비됐어요. 무엇을 찾아드릴까요', 0), 500);
    });

    micBtn.addEventListener('click', () => {
      if (!audioCtx) { alert('먼저 시작 버튼을 눌러주세요'); return; }
      if (isThinking) return;
      isListening ? recognition.stop() : startListening();
    });

    document.addEventListener('touchstart', () => {
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    }, { once: false });
  </script>
</body>
</html>
